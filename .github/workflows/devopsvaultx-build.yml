name: DevOpsVaultX Build and Push

on:
  push:
    tags:
      - 'v*' # On push v1.0, v2.0 tags start workflow
jobs:
  build-and-push:
    runs-on: ubuntu-latest # GitHub default runner (DOCKER ITHE PRE-INSTALLED)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Docker Hub login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. Docker Buildx setup kara (Advanced features)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Image Build & Push on Docker Hub BY using git tag
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Your git tag ${{ github.ref_name }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devopsvaultx:${{ github.ref_name }}
            ${{ secrets.DOCKERHUB_USERNAME }}/devopsvaultx:latest