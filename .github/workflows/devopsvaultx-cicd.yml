name: DevOpsVaultX CI/CD Workflow

on:
  push:
    tags:
      - "v*" # Trigger on tags like v1.0.0, v2.1.0
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --------------------------------------------------
  # JOB 1: TEST - Run Django Tests using Docker Compose
  # --------------------------------------------------
  devopsvaultx_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Temporary Env for Test
        run: |
          cat <<EOF > .env
          SECRET_KEY=django-insecure-test-key-123
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          CSRF_TRUSTED_ORIGINS=http://localhost:8000
          POSTGRES_DB=devopsvaultx_db
          POSTGRES_USER=admin
          POSTGRES_PASSWORD=admin
          POSTGRES_HOST=devopsvaultx_db
          POSTGRES_PORT=5432
          RAZORPAY_KEY_ID=rzp_test_dummy
          RAZORPAY_KEY_SECRET=dummy_secret
          EMAIL_HOST=smtp.gmail.com
          EMAIL_PORT=587
          EMAIL_USE_TLS=True
          EMAIL_HOST_USER=test@gmail.com
          EMAIL_HOST_PASSWORD=testpassword
          CONTACT_EMAIL_SUBJECT=TestSubject
          CONTACT_RECEIVER_EMAIL=admin@test.com
          EOF

      - name: Run DevOpsVaultX Tests
        run: |
          # Build image before container up
          docker compose build devopsvaultx_web

          # Database up
          docker compose up -d devopsvaultx_db

          # Wait for database to be ready (Better way: use dockerize or pg_isready)
          echo "Waiting for database to be ready..."
          timeout 60s sh -c 'until docker exec devopsvaultx_db pg_isready ; do sleep 2 ; done'

          # Run tests
          echo "Running Django tests..."
          docker compose run --rm devopsvaultx_web python manage.py test

      - name: Cleanup
        if: always() # If tests fail, we still want to clean up
        run: docker compose down -v

  # --------------------------------------------------
  # JOB 2: BUILD AND PUSH - Build Image and Push to Docker Hub
  # --------------------------------------------------
  devopsvaultx_build_and_push:
    runs-on: ubuntu-latest
    needs: devopsvaultx_test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Updated from v3 to v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Version Tag
        id: vars
        run: |
          RAW_TAG=${GITHUB_REF_NAME}
          VERSION=${RAW_TAG#v}
          echo "Full Tag: $RAW_TAG"
          echo "Version for Docker: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/devopsvaultx

          echo "Building image: $IMAGE_NAME:${{ env.VERSION }}"
          docker build -t $IMAGE_NAME:${{ env.VERSION }} .

          echo "Building image: $IMAGE_NAME:latest"
          docker build -t $IMAGE_NAME:latest .

          echo "Pushing images to Docker Hub..."
          docker push $IMAGE_NAME:${{ env.VERSION }}
          docker push $IMAGE_NAME:latest

          echo "Images pushed successfully!"

  # --------------------------------------------------
  # JOB 3: DEPLOY - Update Code and Containers on Server
  # --------------------------------------------------
  devopsvaultx_deploy:
    runs-on: ubuntu-latest
    needs: devopsvaultx_build_and_push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }} # DigitalOcean IP
          username: ${{ secrets.EC2_USER }} # 'DigitalOcean Droplet Username'
          key: ${{ secrets.EC2_SSH_KEY }} # Private SSH Key
          script: |
            echo "Connected to Server. Starting deployment..."
            mkdir -p /home/sachinthokal/app
            cd /home/sachinthokal/app

            echo "Updating Deployment files (docker-compose & nginx)..."
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }} .
            else
              git pull origin main
            fi

            echo "Pulling latest images from Docker Hub..."
            docker compose pull

            echo "Restarting containers..."
            docker compose up -d

            echo "Running database migrations..."
            docker compose exec -T devopsvaultx_web python manage.py migrate --noinput

            echo "Collecting static files..."
            docker compose exec -T devopsvaultx_web python manage.py collectstatic --noinput

            echo "Cleaning up unused Docker images..."
            docker image prune -f

            echo "Deployment finished successfully!"
