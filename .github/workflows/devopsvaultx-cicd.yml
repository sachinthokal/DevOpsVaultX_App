name: DevOpsVaultX CI/CD Workflow

on:
  push:
    tags:
      - 'v*' # v1.0.0, v1.1.0 अशा टॅग्सवर ट्रिगर होईल

jobs:
  # --------------------------------------------------
  # JOB 1: TEST (Docker Compose द्वारे)
  # --------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Create Temporary Env for Test
        run: |
          echo "SECRET_KEY=test_key" >> .env
          echo "DEBUG=True" >> .env
          echo "POSTGRES_DB=devopsvaultx_db" >> .env
          echo "POSTGRES_USER=admin" >> .env
          echo "POSTGRES_PASSWORD=admin" >> .env
          echo "POSTGRES_HOST=devopsvaultx_db" >> .env
          echo "POSTGRES_PORT=5432" >> .env

      - name: Run Django Tests
        run: |
          docker compose up -d devopsvaultx_db
          sleep 10 #
          docker compose run --rm --build devopsvaultx_web python manage.py test
          docker compose down

  # --------------------------------------------------
  # JOB 2: BUILD AND PUSH
  # --------------------------------------------------
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Version Tag
        id: vars
        run: |
          RAW_TAG=${GITHUB_REF_NAME}
          echo "VERSION=${RAW_TAG#v}" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/devopsvaultx
          docker build -t $IMAGE_NAME:${{ env.VERSION }} .
          docker build -t $IMAGE_NAME:latest .
          docker push $IMAGE_NAME:${{ env.VERSION }}
          docker push $IMAGE_NAME:latest

  # --------------------------------------------------
  # JOB 3: DEPLOY (EC2 वर)
  # --------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # १. प्रोजेक्ट फोल्डरमध्ये जा (जर नसेल तर तयार होईल)
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app

            # २. कोड पुल करणे (पहिली वेळ असेल तर 'git clone' मॅन्युअली आधी करा)
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }} .
            else
              git pull origin main
            fi

            # ३. GitHub Secret मधून .env फाईल तयार करणे
            echo "${{ secrets.ENV_FILE }}" > .env

            # ४. नवीन इमेजेस पुल करणे आणि कंटेनर्स रीस्टार्ट करणे
            docker compose pull
            docker compose up -d --build

            # ५. डेटाबेस माइग्रेशन आणि क्लिनअप
            docker compose exec -T devopsvaultx_web python manage.py migrate --noinput
            docker image prune -f