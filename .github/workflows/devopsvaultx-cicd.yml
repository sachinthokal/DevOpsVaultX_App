name: DevOpsVaultX CI/CD Workflow

on:
  push:
    tags:
      - 'v*' # Trigger on tags like v1.0.0, v2.1.0

jobs:
  # --------------------------------------------------
  # JOB 1: TEST - Run Django Tests using Docker Compose
  # --------------------------------------------------
  devopsvaultx_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Create Temporary Env for Test
        run: |
          echo "Creating temporary .env file for testing..."
          echo "SECRET_KEY=django-insecure-test-key-123" >> .env
          echo "DEBUG=True" >> .env
          echo "ALLOWED_HOSTS=localhost,127.0.0.1" >> .env
          echo "CSRF_TRUSTED_ORIGINS=http://localhost:8000" >> .env
          echo "POSTGRES_DB=devopsvaultx_db" >> .env
          echo "POSTGRES_USER=admin" >> .env
          echo "POSTGRES_PASSWORD=admin" >> .env
          echo "POSTGRES_HOST=devopsvaultx_db" >> .env
          echo "POSTGRES_PORT=5432" >> .env
          echo "RAZORPAY_KEY_ID=rzp_test_dummy" >> .env
          echo "RAZORPAY_KEY_SECRET=dummy_secret" >> .env
          echo "EMAIL_HOST=smtp.gmail.com" >> .env
          echo "EMAIL_PORT=587" >> .env
          echo "EMAIL_USE_TLS=True" >> .env
          echo "EMAIL_HOST_USER=test@gmail.com" >> .env
          echo "EMAIL_HOST_PASSWORD=testpassword" >> .env
          echo "CONTACT_EMAIL_SUBJECT=TestSubject" >> .env
          echo "CONTACT_RECEIVER_EMAIL=admin@test.com" >> .env

      - name: Run DevOpsVaultX Tests
        run: |
          echo "Starting Database container..."
          docker compose up -d devopsvaultx_db
          sleep 10
          echo "Building app and running Django tests..."
          docker compose run --rm --build devopsvaultx_web python manage.py test
          echo "Cleaning up test containers..."
          docker compose down

  # --------------------------------------------------
  # JOB 2: BUILD AND PUSH - Build Image and Push to Docker Hub
  # --------------------------------------------------
  devopsvaultx_build_and_push:
    runs-on: ubuntu-latest
    needs: devopsvaultx_test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Version Tag
        id: vars
        run: |
          RAW_TAG=${GITHUB_REF_NAME}
          VERSION=${RAW_TAG#v}
          echo "Full Tag: $RAW_TAG"
          echo "Version for Docker: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/devopsvaultx
          
          echo "Building image: $IMAGE_NAME:${{ env.VERSION }}"
          docker build -t $IMAGE_NAME:${{ env.VERSION }} .
          
          echo "Building image: $IMAGE_NAME:latest"
          docker build -t $IMAGE_NAME:latest .
          
          echo "Pushing images to Docker Hub..."
          docker push $IMAGE_NAME:${{ env.VERSION }}
          docker push $IMAGE_NAME:latest
          
          echo "Images pushed successfully!"

  # --------------------------------------------------
  # JOB 3: DEPLOY - Update Code and Containers on EC2
  # --------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: devopsvaultx_build_and_push
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Connected to EC2. Starting deployment..."
            mkdir -p /home/ubuntu/app
            cd /home/ubuntu/app

            echo "Updating source code from GitHub..."
            if [ ! -d ".git" ]; then
              git clone https://github.com/${{ github.repository }} .
            else
              git pull origin main
            fi

            echo "Updating .env file from GitHub Secrets..."
            echo "${{ secrets.ENV_FILE }}" > .env

            echo "Pulling latest images and restarting containers..."
            docker compose pull
            docker compose up -d --build

            echo "Running database migrations..."
            docker compose exec -T devopsvaultx_web python manage.py migrate --noinput
            
            echo "Cleaning up unused Docker images..."
            
            docker image prune -f
            echo "Deployment finished successfully!"