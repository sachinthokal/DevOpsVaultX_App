name: DevOpsVaultX Image Build and Push

on:
  push:
    tags:
      - 'v*' # Run on tag v1.0.1, v2.0.0

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Run Tests
        run: python manage.py test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Git Tag version are used here for docker image tag
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/devopsvaultx:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/devopsvaultx:${{ github.ref_name }}