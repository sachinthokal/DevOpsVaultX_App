[SERVICE]
    # Flush interval in seconds
    Flush        5
    Log_Level    info
    Daemon       off
    Parsers_File /fluent-bit/etc/parsers.conf

# ==================================================
# INPUTS - Reading logs from shared volumes
# ==================================================

# 1. Django Application Logs (JSON)
[INPUT]
    Name           tail
    Path           /mnt/logs/app/*.log
    Tag            django.logs
    Read_from_Head true
    Parser         json_parser
    # Buffer limit to prevent OOM (Out Of Memory) issues
    Mem_Buf_Limit  5MB

# 2. Nginx Access/Error Logs
[INPUT]
    Name           tail
    Path           /mnt/logs/nginx/access_file.log
    Tag            nginx.access # Tag for access logs
    Read_from_Head true
    Parser         json # Nginx access logs
    Mem_Buf_Limit  5MB

[INPUT]
    Name           tail
    Tag            nginx.error
    Path           /mnt/logs/nginx/error_file.log
    Read_from_Head true
    Parser         nginx # Error logs
    Mem_Buf_Limit  5MB


# 3. PostgreSQL Database Logs
[INPUT]
    Name           tail
    Path           /mnt/logs/db/*.log
    Tag            db.logs
    Read_from_Head true
    Mem_Buf_Limit  5MB

# ==================================================
# OUTPUT - Sending all logs to OpenSearch
# ==================================================

[OUTPUT]
    Name            opensearch
    Match           *
    Host            opensearch
    Port            9200
    Include_Tag_Key On
    Tag_Key         tag
    HTTP_User       ${OPENSEARCH_USER}
    HTTP_Passwd     ${OPENSEARCH_PASS}
    # Index name for visualization
    Index           devopsvaultx_app
    Logstash_Format On
    Logstash_Prefix devopsvaultx
    # Required for OpenSearch 2.x+ compatibility
    Suppress_Type_Name On
    # Keep TLS Off if you disabled security in docker-compose
    tls             Off
    tls.verify      Off