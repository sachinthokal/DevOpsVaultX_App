{% extends 'base.html' %}
{% block content %}
<div class="auth-modal" style="display: flex; position: relative; min-height: 80vh;">
    <div class="modal-card">
        <div class="modal-header">
            <h2>RESET PASSWORD</h2>
            <p>Enter your email to receive a recovery link</p>
        </div>
        <form class="auth-form" method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_email">Email Address</label>
                <input type="email" name="email" id="id_email" placeholder="name@example.com" required>
            </div>
            <button type="submit" class="auth-btn" style="background: linear-gradient(45deg, #ff4500, #ff8c00);">
                Send
            </button>
        </form>
        <div class="link-section">
            <p><a href="/">Back to Home</a></p>
        </div>
    </div>
</div>
{% endblock %}
