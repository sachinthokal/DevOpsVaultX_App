{% extends 'base.html' %}
{% block content %}
<div class="auth-modal" style="display: flex; position: relative; background: none; min-height: 80vh;">
    <div class="modal-card" style="text-align: center;">
        <i class="fas fa-check-circle" style="font-size: 48px; color: #10b981; margin-bottom: 20px;"></i>
        <h2>You're Good to Go!</h2>
        <p>We've successfully updated your password. Keep it safe and happy deploying!</p>
        <div class="link-section">
            {% if request.user.is_authenticated %}
            <button {% url 'pages:home' %} class="auth-btn">Happy Learning !!</button>
            {% else %}
            <button onclick="openModal('loginModal')" title="Login to DevOpsVaultX" class="auth-btn">Log In Now</button>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
