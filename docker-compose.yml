services:
  # =========================
  # Django Web Service
  # =========================
  devopsvaultx_web:
    image: ${{ secrets.DOCKERHUB_USERNAME }}/devopsvaultx:latest
    container_name: devopsvaultx_app
    restart: always
    env_file:
      - .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - devopsvaultx_db
    networks:
      - devopsvaultx_network
    command: >
      sh -c "
      sleep 5 &&
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      python create_admin.py &&
      gunicorn devopsvaultx.wsgi:application --bind 0.0.0.0:8000 --workers 3
      "

  # =========================
  # PostgreSQL Database
  # =========================
  devopsvaultx_db:
    image: postgres:15
    container_name: devopsvaultx_db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - devopsvaultx_network

  # =========================
  # NGINX Reverse Proxy
  # =========================
  devopsvaultx_nginx:
    image: nginx:latest
    container_name: devopsvaultx_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt   # SSL certs (host varun mount)
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - devopsvaultx_web
    networks:
      - devopsvaultx_network

# =========================
# Volumes
# =========================
volumes:
  postgres_data:
  static_volume:
  media_volume:

# =========================
# Networks
# =========================
networks:
  devopsvaultx_network: