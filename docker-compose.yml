services:
  # =========================
  # Django Web Service
  # =========================
  devopsvaultx_web:
    build: .
    image: sachinthokal/devopsvaultx:latest
    container_name: devopsvaultx_app
    restart: always
    env_file:
      - .env
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - app_logs:/app/logs
      - ./logs/devopsvaultx_app:/app/logs
    depends_on:
      - devopsvaultx_db
    networks:
      - devopsvaultx_network
    command: >
      sh -c "
      sleep 5 &&
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      python create_admin.py &&
      gunicorn devopsvaultx.wsgi:application --bind 0.0.0.0:8000 --workers 3
      "

  # =========================
  # PostgreSQL Database
  # =========================
  devopsvaultx_db:
    image: postgres:15
    container_name: devopsvaultx_db
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data/
      - db_logs:/var/log/postgresql
      - ./logs/devopsvaultx_db:/var/log/postgresql
    command: ["postgres", "-c", "logging_collector=on", "-c", "log_destination=stderr", "-c", "log_directory=/var/log/postgresql", "-c", "log_filename=postgresql.log"]
    networks:
      - devopsvaultx_network

  # =========================
  # NGINX Reverse Proxy
  # =========================
  devopsvaultx_nginx:
    image: nginx:latest
    container_name: devopsvaultx_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - nginx_logs:/var/log/nginx
      - ./logs/devopsvaultx_nginx:/var/log/nginx
    depends_on:
      - devopsvaultx_web
    networks:
      - devopsvaultx_network


# =========================
# Volumes
# =========================
volumes:
  postgres_data:
  static_volume:
  media_volume:
  opensearch_data:
  app_logs:
  db_logs:
  nginx_logs:

# =========================
# Networks
# =========================
networks:
  devopsvaultx_network: