# ==============================
# HTTP → Redirect to HTTPS
# ==============================
server {
    listen 80;
    server_name devopsvaultx.com www.devopsvaultx.com;

    return 301 https://$host$request_uri;
}

# ==============================
# HTTPS Server
# ==============================
server {
    listen 443 ssl;
    server_name devopsvaultx.com www.devopsvaultx.com;

    ssl_certificate /etc/letsencrypt/live/devopsvaultx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/devopsvaultx.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Static files
    location /static/ {
        alias /app/staticfiles/;
    }

    # Media files
    location /media/ {
        alias /app/media/;
    }

    # Django App
    location / {
        proxy_pass http://devopsvaultx_web:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}