user  nginx;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {

    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # =========================
    # Enable GZIP Compression
    # =========================
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # =========================
    # Upstream Django (Gunicorn)
    # =========================
    upstream devopsvaultx_django {
        server devopsvaultx_web:8000;
    }

    # =========================
    # HTTP Server (Port 80)
    # =========================
    server {
        listen 80;
        server_name devopsvaultx.com www.devopsvaultx.com;

        client_max_body_size 50M;

        # =========================
        # Static files (Long Cache)
        # =========================
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            access_log off;
        }

        # =========================
        # Media files
        # =========================
        location /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            access_log off;
        }

        # =========================
        # Images optimization
        # =========================
        # Ya block la asha prakare update kara:
        location ~* \.(jpg|jpeg|png|webp|gif|svg|ico)$ {
            alias /app/staticfiles/; 
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            access_log off;
        }

        # =========================
        # Django App
        # =========================
        location / {
            proxy_pass http://devopsvaultx_django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}